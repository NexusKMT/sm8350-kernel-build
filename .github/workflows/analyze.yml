name: Analyze

on:
  workflow_dispatch:
    inputs:
      vendor_release:
        description: "Release tag holding vendor_a.img.gz / odm_a.img"
        required: false
        default: "firmware-vendor"

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Download firmware assets
        run: |
          mkdir -p fw
          gh release download "${{ inputs.vendor_release }}" \
            -R "$GITHUB_REPOSITORY" -D fw -p "*.img" -p "*.img.gz" || true
          [ -f fw/vendor_a.img.gz ] && gunzip -f fw/vendor_a.img.gz
          ls -la fw/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Stage firmware for jobs
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: fw/*.img
          if-no-files-found: error

  inventory:
    needs: setup
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Fetch firmware
        uses: actions/download-artifact@v7
        with: { name: firmware, path: fw }
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends kmod e2fsprogs
      - name: Mount & list modules
        run: |
          set -e
          sudo mkdir -p /mnt/vendor /mnt/odm
          sudo mount -o loop,ro fw/vendor_a.img /mnt/vendor
          sudo mount -o loop,ro fw/odm_a.img     /mnt/odm || true
          mkdir -p out
          sudo find /mnt/vendor /mnt/odm -name '*.ko' -printf '%s\t%p\n' | sort -k2 > out/inventory.txt
          {
            sudo find /mnt/vendor /mnt/odm -name '*.ko' 2>/dev/null | sort | while read -r m; do
              printf '%-40s %s\n' "$(basename "$m")" "$(modinfo -F vermagic "$m" 2>/dev/null | head -1)"
            done
          } > out/vermagic.txt
          echo "module count: $(grep -c '\.ko' out/inventory.txt)"
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v7
        with: { name: analyze-inventory, path: out/, if-no-files-found: error }
      - name: Unmount
        if: always()
        run: sudo umount /mnt/vendor /mnt/odm 2>/dev/null || true

  crc:
    needs: setup
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Fetch firmware
        uses: actions/download-artifact@v7
        with: { name: firmware, path: fw }
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends e2fsprogs python3
      - name: Download kernel Module.symvers (from latest successful Build run)
        continue-on-error: true
        run: |
          mkdir -p ks
          LATEST=$(gh run list -R "$GITHUB_REPOSITORY" --workflow=build.yml --status=success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$LATEST" ]; then
            gh run download "$LATEST" -R "$GITHUB_REPOSITORY" -n kernel-Module.symvers -D ks 2>/dev/null || true
          fi
          ls -la ks/ 2>/dev/null || echo "no Module.symvers (run Build workflow first)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Mount vendor + odm
        run: |
          sudo mkdir -p /mnt/vendor /mnt/odm
          sudo mount -o loop,ro fw/vendor_a.img /mnt/vendor
          sudo mount -o loop,ro fw/odm_a.img     /mnt/odm || true
      - name: CRC analysis
        run: |
          set -e
          mkdir -p out
          sudo find /mnt/vendor /mnt/odm -name '*.ko' 2>/dev/null | sort > out/all_modules.txt
          sudo cp out/all_modules.txt /tmp/all_modules.txt
          sudo chmod 644 /tmp/all_modules.txt
          python3 - <<'PY'
          import struct, glob, os
          def elf_versions(path):
              d=open(path,'rb').read()
              if d[:4]!=b'\x7fELF' or d[4]!=2: return {}
              e_shoff=struct.unpack_from('<Q',d,0x28)[0]
              e_shentsize=struct.unpack_from('<H',d,0x3a)[0]
              e_shnum=struct.unpack_from('<H',d,0x3c)[0]
              e_shstrndx=struct.unpack_from('<H',d,0x3e)[0]
              str_o=struct.unpack_from('<Q',d,e_shoff+e_shstrndx*e_shentsize+24)[0]
              str_s=struct.unpack_from('<Q',d,e_shoff+e_shstrndx*e_shentsize+32)[0]
              shstr=d[str_o:str_o+str_s]
              for i in range(e_shnum):
                  o=e_shoff+i*e_shentsize
                  name,typ,flags,addr,offset,size=struct.unpack_from('<IIQQQQ',d,o)
                  nm=shstr[name:].split(b'\x00')[0].decode(errors='replace')
                  if nm=='__versions':
                      vd=d[offset:offset+size]; req={}; ent=64
                      for i in range(size//ent):
                          e=vd[i*ent:(i+1)*ent]
                          crc=struct.unpack('<I',e[:4])[0]
                          n=e[8:8+55].split(b'\x00')[0].decode(errors='replace')
                          if n: req[n]=crc
                      return req
              return {}
          mods=[l.strip() for l in open('/tmp/all_modules.txt') if l.strip()]
          ksym={}
          for f in glob.glob('ks/**/Module.symvers',recursive=True):
              for line in open(f):
                  p=line.split('\t')
                  if len(p)>=4:
                      try: ksym[p[1]]=int(p[0],16)
                      except: pass
          allreq={}
          for m in mods:
              for nm,crc in elf_versions(m).items():
                  allreq.setdefault(nm,{'crc':crc,'mods':set()})['mods'].add(os.path.basename(m))
          matched=[]; mismatched=[]; missing=[]
          for nm,info in sorted(allreq.items()):
              if nm in ksym:
                  if ksym[nm]==info['crc']:
                      matched.append(nm)
                  else:
                      mismatched.append((nm,info['crc'],ksym[nm],sorted(info['mods'])))
              else:
                  missing.append((nm,info['crc'],sorted(info['mods'])))
          ks_src = f"Module.symvers (built kernel, {len(ksym)} exports)" if ksym else "NONE — run Build first"
          with open('out/crc_report.md','w') as f:
              f.write(f"# Vendor-module CRC analysis\n\n")
              f.write(f"- modules analyzed: {len(mods)}\n")
              f.write(f"- unique kernel symbols required: {len(allreq)}\n")
              f.write(f"- kernel CRC source: {ks_src}\n\n")
              f.write(f"## Result\n")
              f.write(f"- ✅ CRC match: **{len(matched)}**\n")
              f.write(f"- ❌ CRC mismatch: **{len(mismatched)}**\n")
              f.write(f"- ❓ required but kernel doesn't export: **{len(missing)}**\n\n")
              if mismatched:
                  f.write(f"## CRC MISMATCHES (kernel provides symbol but WRONG CRC → module refuses to load)\n\n")
                  f.write("| symbol | module wants | kernel has | required by |\n|---|---|---|---|\n")
                  for nm,want,got,m in mismatched[:200]:
                      f.write(f"| `{nm}` | {hex(want)} | {hex(got)} | {', '.join(m)} |\n")
              if missing:
                  f.write(f"\n## MISSING EXPORTS (modules need symbols kernel doesn't provide)\n\n")
                  f.write("| symbol | CRC wanted | required by |\n|---|---|---|\n")
                  for nm,want,m in missing[:200]:
                      f.write(f"| `{nm}` | {hex(want)} | {', '.join(m)} |\n")
          print(open('out/crc_report.md').read()[:4000])
          PY
      - name: Upload
        uses: actions/upload-artifact@v7
        with: { name: analyze-crc, path: out/, if-no-files-found: error }
      - name: Unmount
        if: always()
        run: sudo umount /mnt/vendor /mnt/odm 2>/dev/null || true

  load-order:
    needs: setup
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Fetch firmware
        uses: actions/download-artifact@v7
        with: { name: firmware, path: fw }
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends e2fsprogs
      - name: Mount vendor
        run: |
          sudo mkdir -p /mnt/vendor
          sudo mount -o loop,ro fw/vendor_a.img /mnt/vendor
      - name: Extract load order + deps
        run: |
          set -e
          mkdir -p out
          sudo find /mnt/vendor -name 'modules.load' -exec cp {} out/ \; 2>/dev/null || true
          sudo find /mnt/vendor -name 'modules.dep'  -exec cp {} out/ \; 2>/dev/null || true
          {
            echo "## Boot module load order (modules.load)"
            cat out/modules.load 2>/dev/null | grep '\.ko' || echo "(no modules.load found)"
            echo ""
            echo "## Count: $(grep -c '\.ko' out/modules.load 2>/dev/null || echo 0) modules"
          } > out/load_order.md
      - name: Upload
        uses: actions/upload-artifact@v7
        with: { name: analyze-loadorder, path: out/, if-no-files-found: error }
      - name: Unmount
        if: always()
        run: sudo umount /mnt/vendor 2>/dev/null || true

  vermagic:
    needs: setup
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Fetch firmware
        uses: actions/download-artifact@v7
        with: { name: firmware, path: fw }
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends kmod e2fsprogs
      - name: Mount vendor + odm
        run: |
          sudo mkdir -p /mnt/vendor /mnt/odm
          sudo mount -o loop,ro fw/vendor_a.img /mnt/vendor
          sudo mount -o loop,ro fw/odm_a.img     /mnt/odm || true
      - name: Collect distinct vermatics
        run: |
          set -e
          mkdir -p out
          sudo find /mnt/vendor /mnt/odm -name '*.ko' 2>/dev/null | sort | while read -r m; do
            modinfo -F vermagic "$m" 2>/dev/null | head -1
          done | sort | uniq -c | sort -rn > out/vermagic_distribution.txt
          {
            echo "## Distinct vermagic strings required by ALL vendor/odm modules"
            echo '```'
            cat out/vermagic_distribution.txt
            echo '```'
          } > out/vermagic_report.md
      - name: Upload
        uses: actions/upload-artifact@v7
        with: { name: analyze-vermagic, path: out/, if-no-files-found: error }
      - name: Unmount
        if: always()
        run: sudo umount /mnt/vendor /mnt/odm 2>/dev/null || true
