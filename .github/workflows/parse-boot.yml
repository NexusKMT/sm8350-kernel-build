name: Parse

on:
  workflow_dispatch:
    inputs:
      boot_file:
        description: "Boot image filename in boot/ (leave empty to parse all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  list-boot-images:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - id: list
        run: |
          if [ -n "${{ inputs.boot_file }}" ]; then
            echo "matrix=[\"${{ inputs.boot_file }}\"]" >> "$GITHUB_OUTPUT"
          else
            FILES=$(find boot/ -maxdepth 1 -name '*.img' -exec basename {} \; | sort | jq -R . | jq -sc .)
            echo "matrix=$FILES" >> "$GITHUB_OUTPUT"
          fi

  parse:
    needs: list-boot-images
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      matrix:
        boot: ${{ fromJson(needs.list-boot-images.outputs.matrix) }}

    steps:
      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3 cpio gzip xz-utils file

      - name: Fetch official AOSP tools
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg
          git clone --depth=1 https://android.googlesource.com/platform/external/avb       tools/avb
          echo "UNPACK=$PWD/tools/mkbootimg/unpack_bootimg.py"     >> "$GITHUB_ENV"
          echo "AVBTOOL=$PWD/tools/avb/avbtool.py"                 >> "$GITHUB_ENV"

      - name: Unpack ${{ matrix.boot }}
        run: |
          mkdir -p out/unpacked
          python3 "$UNPACK" --boot_img "boot/${{ matrix.boot }}" --format=info   | tee out/boot_info.txt
          python3 "$UNPACK" --boot_img "boot/${{ matrix.boot }}" --format=mkbootimg | tee out/repack_command.txt
          python3 "$UNPACK" --boot_img "boot/${{ matrix.boot }}" --out out/unpacked
          ls -la out/unpacked/
          file out/unpacked/* 2>/dev/null

      - name: Inspect ramdisk
        run: |
          file out/unpacked/ramdisk
          echo "size: $(stat -c%s out/unpacked/ramdisk) bytes"

      - name: Probe AVB structure
        run: |
          python3 "$AVBTOOL" info_image --image "boot/${{ matrix.boot }}" --output out/avb_info.txt
          cat out/avb_info.txt

      - name: Inspect kernel
        run: |
          file out/unpacked/kernel
          echo "size: $(stat -c%s out/unpacked/kernel) bytes"
          echo "magic @0x00 : $(xxd -l 4 out/unpacked/kernel | awk '{print $2$3}')"
          echo "magic @0x38 : $(xxd -s 56 -l 4 out/unpacked/kernel | awk '{print $2$3}')"
          strings out/unpacked/kernel | grep -m3 -iE 'Linux version|5\.4\.61|qgki'

      - name: Extract kernel .config (IKCONFIG)
        run: |
          curl -sL "https://android.googlesource.com/kernel/msm/+/refs/tags/android-11.0.0_r0.31/scripts/extract-ikconfig?format=TEXT" \
            | base64 -d > tools/extract-ikconfig
          chmod +x tools/extract-ikconfig
          tools/extract-ikconfig out/unpacked/kernel > out/extracted.config
          test -s out/extracted.config
          echo "config lines: $(wc -l < out/extracted.config)"
          grep -E '^CONFIG_(LOCALVERSION|ARCH_LAHAINA|IKCONFIG|MODULES|MODVERSIONS)=' out/extracted.config

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: parsed-${{ matrix.boot }}
          path: |
            out/boot_info.txt
            out/repack_command.txt
            out/avb_info.txt
            out/extracted.config
            out/unpacked/kernel
            out/unpacked/ramdisk
          if-no-files-found: error
