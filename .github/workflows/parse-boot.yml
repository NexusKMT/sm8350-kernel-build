name: Parse stock boot.img

# READ-ONLY ground-truth harness.
#
# Sole purpose: take the stock alpha_boot_a.img from the `stock-boot-template`
# release and dissect it with OFFICIAL AOSP tools only — no third-party repack
# scripts, no magiskboot, nothing hand-rolled. Everything this workflow reports
# is machine-generated by the upstream tools, so it is the single source of
# truth for what the stock boot image actually contains (header fields, ramdisk,
# AVB structure). Later build/repack steps reference these artifacts instead of
# anyone's memory.
#
# Tools (all from Android Open Source Project, cloned verbatim):
#   - mkbootimg  : platform/system/tools/mkbootimg (unpack_bootimg.py / mkbootimg.py)
#   - avb        : platform/external/avb (avbtool.py)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/parse-boot.yml'

permissions:
  contents: read

env:
  BOOT_RELEASE_TAG: stock-boot-template
  BOOT_ASSET: alpha_boot_a.img

jobs:
  parse:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout harness
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3 cpio gzip xz-utils file

      - name: Fetch official AOSP tools
        run: |
          # Official AOSP sources, anonymous clone. Pinned by being the latest
          # tip of the default branch of each AOSP tree at run time.
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg
          git clone --depth=1 https://android.googlesource.com/platform/external/avb       tools/avb
          echo "MKBOOTIMG=$PWD/tools/mkbootimg/mkbootimg.py"       >> "$GITHUB_ENV"
          echo "UNPACK=$PWD/tools/mkbootimg/unpack_bootimg.py"     >> "$GITHUB_ENV"
          echo "AVBTOOL=$PWD/tools/avb/avbtool.py"                 >> "$GITHUB_ENV"

      - name: Download stock boot.img template
        run: |
          mkdir -p out
          gh release download "$BOOT_RELEASE_TAG" \
            -R "$GITHUB_REPOSITORY" -p "$BOOT_ASSET" -D out
          ls -la out/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── unpack_bootimg: boot header + kernel + ramdisk ──────────────────────
      - name: Unpack boot.img (official unpack_bootimg)
        run: |
          mkdir -p out/unpacked
          # Human-readable header dump
          python3 "$UNPACK" --boot_img "out/$BOOT_ASSET" --format=info \
            | tee out/boot_info.txt
          # Machine-readable reconstruction command = the canonical "config"
          python3 "$UNPACK" --boot_img "out/$BOOT_ASSET" --format=mkbootimg \
            | tee out/repack_command.txt
          # Actual payload extraction
          python3 "$UNPACK" --boot_img "out/$BOOT_ASSET" --out out/unpacked
          ls -la out/unpacked/
          file out/unpacked/* 2>/dev/null || true

      # ── ramdisk inspection (compression + top-level entries) ───────────────
      - name: Inspect ramdisk
        run: |
          rd=out/unpacked/ramdisk
          {
            echo "## ramdisk"
            echo
            echo "\`\`\`"
            file "$rd"
            echo "size: $(stat -c%s "$rd") bytes"
            echo
            echo "top-level entries (decompressed):"
            tmp=$(mktemp -d)
            ( cd "$tmp" && gzip -dc "$OLDPWD/$rd" 2>/dev/null | cpio -idm --quiet )
            ls -1 "$tmp" | head -60
            echo
            echo "init.rc / fstab fragments:"
            find "$tmp" -maxdepth 2 -name 'init*.rc' -o -name 'fstab*' 2>/dev/null | sort
            echo "\`\`\`"
            rm -rf "$tmp"
          } | tee out/ramdisk_info.md

      # ── avbtool: AVB / vbmeta structure (verified-boot truth) ───────────────
      - name: Probe AVB structure (official avbtool)
        run: |
          python3 "$AVBTOOL" info_image \
            --image "out/$BOOT_ASSET" --output out/avb_info.txt
          cat out/avb_info.txt

      # ── kernel image sanity (format / version magic) ───────────────────────
      - name: Inspect stock kernel
        run: |
          k=out/unpacked/kernel
          {
            echo "## stock kernel"
            echo
            echo "\`\`\`"
            file "$k"
            echo "size: $(stat -c%s "$k") bytes"
            echo "magic @0x00 : $(xxd -l 4 "$k" | awk '{print $2$3}')"
            echo "magic @0x38 : $(xxd -s 56 -l 4 "$k" | awk '{print $2$3}')  (ARM64 Image = 41524d64 'ARMd')"
            # Try to read the banner / version string if uncompressed
            strings "$k" | grep -m3 -iE 'Linux version|5\.4\.61|qgki' || echo "(no readable version string in raw Image)"
            echo "\`\`\`"
          } | tee out/kernel_info.md

      # ── Synthesize the authoritative verdict on the brick hypothesis ────────
      - name: Synthesize AVB verdict + build summary
        run: |
          bash .github/workflows/scripts/synthesize.sh

      # ── Artifacts: each a distinct, reusable asset ─────────────────────────
      - name: Upload boot payload
        uses: actions/upload-artifact@v4
        with:
          name: stock-boot-payload
          path: |
            out/unpacked/kernel
            out/unpacked/ramdisk
          if-no-files-found: error

      - name: Upload boot config (reconstruction command + header)
        uses: actions/upload-artifact@v4
        with:
          name: stock-boot-config
          path: |
            out/boot_info.txt
            out/repack_command.txt
            out/avb_info.txt
            out/kernel_info.md
            out/ramdisk_info.md
          if-no-files-found: error

      - name: Upload full stock boot.img (for downstream repack)
        uses: actions/upload-artifact@v4
        with:
          name: stock-boot-image
          path: out/${{ env.BOOT_ASSET }}
          if-no-files-found: error

      - name: Write job summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (p) => { try { return fs.readFileSync(p,'utf8'); } catch { return ''; } };
            const code = (s) => '```\n' + s.trim() + '\n```\n';
            const md = [
              '# Stock `boot.img` ground-truth report',
              '',
              '> Produced **only** by official AOSP tools (`unpack_bootimg`, `avbtool`).',
              '> This is the authoritative reference for the stock image — superseding any earlier manual analysis.',
              '',
              '## Boot header (`unpack_bootimg --format=info`)',
              '',
              code(read('out/boot_info.txt')),
              '## AVB / verified-boot structure (`avbtool info_image`)',
              '',
              code(read('out/avb_info.txt')),
              '## Reconstruction command (= canonical config)',
              '',
              'Use this verbatim with `mkbootimg` to rebuild a byte-faithful stock boot.img:',
              '',
              '```sh',
              read('out/repack_command.txt').trim(),
              '```',
              '',
              read('out/kernel_info.md'),
              read('out/ramdisk_info.md'),
              read('out/avb_verdict.md'),
              '',
              '## Artifacts',
              '- `stock-boot-payload` — extracted `kernel` + `ramdisk`',
              '- `stock-boot-config` — all text dumps above',
              '- `stock-boot-image` — original `alpha_boot_a.img`',
              '- `avb_verdict.md` — verified-boot conclusion',
            ].join('\n');
            await core.summary.addRaw(md).write();
            await core.summary.write();
