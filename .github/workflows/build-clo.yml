name: BuildCLO

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  KERNEL_REPO: arter97-mirror/caf_msm-5.4
  KERNEL_REF: LA.UM.10.9.1.r1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: false
          swap-storage: true

      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex \
            gcc git libelf-dev libssl-dev lz4 make \
            python3 zip zstd

      - name: Set up workspace
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 -b "$KERNEL_REF" "https://github.com/${KERNEL_REPO}.git" kernel/msm-5.4

      - name: Fetch techpack components
        run: |
          cd "$GITHUB_WORKSPACE/kernel/msm-5.4/techpack"
          CLO=https://git.codelinaro.org/clo/la/platform/vendor/opensource
          git clone --depth=1 -b LA.UM.10.9.1.r1   "$CLO/audio-kernel.git"   audio
          git clone --depth=1 -b LA.UM.10.9.1.r1.1 "$CLO/display-drivers.git" display
          git clone --depth=1 -b LA.UM.10.9.1.r1   "$CLO/video-driver.git"   video
          git clone --depth=1 -b LA.UM.10.9.1.r1   "$CLO/dataipa.git"        dataipa
          git clone --depth=1 -b LA.UM.10.9.1.r1.1 "$CLO/camera-kernel.git"  camera
          echo "=== techpack dirs ==="
          ls

      - name: Fetch lahaina DTBs
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/schqiushui/android_kernel_motorola_sm8350.git /tmp/moto
          cd /tmp/moto
          git sparse-checkout set arch/arm64/boot/dts/vendor
          git checkout
          DTS_ROOT="$GITHUB_WORKSPACE/kernel/msm-5.4/arch/arm64/boot/dts"
          mkdir -p "$DTS_ROOT/vendor/qcom"
          cp -r arch/arm64/boot/dts/vendor/qcom/. "$DTS_ROOT/vendor/qcom/"
          cp arch/arm64/boot/dts/vendor/Makefile "$DTS_ROOT/vendor/Makefile"
          printf '%s\n' \
            'dtb-$(CONFIG_ARCH_LAHAINA) += lahaina-rumi.dtb \' \
            '	lahaina-mtp-hsp.dtb \' \
            '	lahaina-mtp.dtb \' \
            '	lahaina-qrd-hsp.dtb \' \
            '	lahaina-qrd.dtb \' \
            '	lahaina-qrd-module.dtb \' \
            '	lahainap-mtp.dtb \' \
            '	lahainap-qrd.dtb' \
            '' \
            'ifeq ($(CONFIG_BUILD_ARM64_DT_OVERLAY),y)' \
            'dtbo-$(CONFIG_ARCH_LAHAINA) += lahaina-qrd-overlay.dtbo \' \
            '	lahaina-mtp-overlay.dtbo \' \
            '	lahaina-qrd-hsp-overlay.dtbo \' \
            '	lahaina-qrd-module-overlay.dtbo \' \
            '	lahaina-mtp-hsp-overlay.dtbo' \
            '' \
            'lahaina-qrd-overlay.dtbo-base := lahaina.dtb lahaina-v2.dtb lahaina-v2.1.dtb' \
            'lahaina-mtp-overlay.dtbo-base := lahaina.dtb lahaina-v2.dtb lahaina-v2.1.dtb' \
            'lahaina-qrd-hsp-overlay.dtbo-base := lahaina.dtb' \
            'lahaina-qrd-module-overlay.dtbo-base := lahaina.dtb lahaina-v2.dtb lahaina-v2.1.dtb' \
            'lahaina-mtp-hsp-overlay.dtbo-base := lahaina.dtb' \
            'endif' \
            '' \
            'always-y := $(dtb-y) $(dtbo-y)' \
            > "$DTS_ROOT/vendor/qcom/Makefile"
          if ! grep -q 'subdir-y += vendor' "$DTS_ROOT/Makefile"; then
            echo 'subdir-y += vendor' >> "$DTS_ROOT/Makefile"
          fi
          echo "=== lahaina dts files: $(ls "$DTS_ROOT/vendor/qcom/" | grep -c '^lahaina') ==="

      - name: Cache AOSP Clang r416183b
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: prebuilts-master/clang/host/linux-x86/clang-r416183b
          key: aosp-clang-r416183b

      - name: Download AOSP Clang r416183b
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p prebuilts-master/clang/host/linux-x86/clang-r416183b
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master-kernel-build-2021/clang-r416183b.tar.gz" \
            | tar xz -C prebuilts-master/clang/host/linux-x86/clang-r416183b
          prebuilts-master/clang/host/linux-x86/clang-r416183b/bin/clang --version

      - name: Cache aarch64 + arm GCC 4.9
        id: cache-gcc
        uses: actions/cache@v5
        with:
          path: |
            prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
            prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
          key: aosp-gcc-4.9-android12L

      - name: Download aarch64 + arm GCC 4.9
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          mkdir -p prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          mkdir -p prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android12L-release.tar.gz" \
            | tar xz -C prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/android12L-release.tar.gz" \
            | tar xz -C prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: sm8350-clo-lahaina-5.4
          max-size: 2G

      # =========================================================================
      # Generate defconfig — calls CLO's own generate_defconfig.sh which
      # merges: gki_defconfig + lahaina_GKI.config(allyes) + lahaina_QGKI.config
      # + lahaina_debug.config → vendor/lahaina-qgki-debug_defconfig
      # =========================================================================
      - name: Generate defconfig from fragments
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kernel/msm-5.4"
          export PATH="$GITHUB_WORKSPACE/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin:$PATH"
          export TARGET_BUILD_VARIANT=userdebug
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export REAL_CC=clang
          export HOSTCC=gcc
          export HOSTLD=ld
          export HOSTAR=ar

          scripts/gki/generate_defconfig.sh vendor/lahaina-qgki-debug_defconfig
          echo "=== defconfig generated ==="
          ls -la arch/arm64/configs/vendor/lahaina-qgki-debug_defconfig

      # =========================================================================
      # Apply defconfig and resolve dependencies — direct make, not build.sh
      # =========================================================================
      - name: Apply defconfig
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          export PATH="$GITHUB_WORKSPACE/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin:$PATH"
          KERNEL=kernel/msm-5.4

          KBUILD_ARGS=(
            O=out
            ARCH=arm64
            CC="ccache clang"
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          make "${KBUILD_ARGS[@]}" vendor/lahaina-qgki-debug_defconfig
          make "${KBUILD_ARGS[@]}" olddefconfig

          echo "=== .config verification ==="
          echo "ARCH_LAHAINA: $(grep '^CONFIG_ARCH_LAHAINA=' out/.config || echo MISSING)"
          echo "QGKI: $(grep '^CONFIG_QGKI=' out/.config || echo MISSING)"
          echo "DRM_MSM: $(grep -E '^CONFIG_DRM_MSM[= ]' out/.config || echo 'NOT SET (will use .conf export)')"
          echo "DISPLAY_BUILD: $(grep '^CONFIG_DISPLAY_BUILD=' out/.config || echo 'NOT SET (expected — set by techpack .conf)')"
          echo "builtin (=y): $(grep -cE '^CONFIG.*=y$' out/.config)"
          echo "module (=m):  $(grep -cE '^CONFIG.*=m$' out/.config)"

      # =========================================================================
      # Display-notifier __weak stubs — display is built as a module (=m),
      # so vmlinux itself doesn't have msm_drm symbols. Other in-tree code
      # (camera, touch) may reference msm_drm_register_client etc. at link
      # time. __weak stubs satisfy the linker; when the real msm_drm.ko loads,
      # its strong symbols override these.
      # =========================================================================
      - name: Inject display-notifier stubs for vmlinux linkage
        run: |
          cd "$GITHUB_WORKSPACE/kernel/msm-5.4"
          STUB_DIR="drivers/clo_display_stubs"
          mkdir -p "$STUB_DIR"

          cat > "$STUB_DIR/display_notifier_stubs.c" << 'EOF'
          // SPDX-License-Identifier: GPL-2.0-only
          // Weak stubs for msm_drm notifier symbols.
          // Display is built as a module (=m); these stubs let vmlinux link
          // without the real display driver. The real symbols override at
          // module load time.

          #include <linux/module.h>
          #include <linux/notifier.h>

          int __weak msm_drm_register_client(struct notifier_block *nb)
          {
          	return 0;
          }
          EXPORT_SYMBOL(msm_drm_register_client);

          int __weak msm_drm_unregister_client(struct notifier_block *nb)
          {
          	return 0;
          }
          EXPORT_SYMBOL(msm_drm_unregister_client);

          int __weak register_lcdinfo_notifier(struct notifier_block *nb)
          {
          	return 0;
          }
          EXPORT_SYMBOL(register_lcdinfo_notifier);

          int __weak unregister_lcdinfo_notifier(struct notifier_block *nb)
          {
          	return 0;
          }
          EXPORT_SYMBOL(unregister_lcdinfo_notifier);
          EOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' "$STUB_DIR/display_notifier_stubs.c"

          cat > "$STUB_DIR/Makefile" << 'EOF'
          obj-y += display_notifier_stubs.o
          EOF

          if ! grep -q 'clo_display_stubs' drivers/Makefile; then
            echo 'obj-y += clo_display_stubs/' >> drivers/Makefile
            echo "Hooked clo_display_stubs/ into drivers/Makefile"
          fi

          echo "=== stub contents ==="
          cat "$STUB_DIR/display_notifier_stubs.c"

      # =========================================================================
      # Build — split into Image / dtbs / modules for error isolation.
      # Display compiles as a module via techpack/.conf → lahainadisp.conf
      # injection chain. No hacks needed.
      # =========================================================================
      - name: Build Image
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          export PATH="$GITHUB_WORKSPACE/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin:$PATH"

          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            Image 2>&1 | tee build.log
          RC=${PIPESTATUS[0]}

          if [ "$RC" -ne 0 ] || [ ! -f out/arch/arm64/boot/Image ]; then
            echo "=== BUILD FAILED (exit $RC) ==="
            grep -E "error:|undefined reference|ld.lld: error|Stop\." build.log | tail -40 || true
            exit 1
          fi

          echo "=== Image built ==="
          du -h out/arch/arm64/boot/Image

      - name: Build DTBs
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          export PATH="$GITHUB_WORKSPACE/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin:$PATH"

          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            dtbs 2>&1 | tee -a build.log

          LAHAINA_COUNT=$(find out -name 'lahaina*.dtb' 2>/dev/null | wc -l)
          echo "=== lahaina DTBs: $LAHAINA_COUNT ==="
          test "$LAHAINA_COUNT" -gt 0

      - name: Build modules (includes display as =m)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          export PATH="$GITHUB_WORKSPACE/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin:$PATH"

          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            modules 2>&1 | tee -a build.log
          RC=${PIPESTATUS[0]}

          if [ "$RC" -ne 0 ]; then
            echo "=== MODULES BUILD FAILED (exit $RC) ==="
            grep -E "error:|undefined reference|Stop\." build.log | tail -40 || true
            exit 1
          fi

          echo "=== modules built ==="
          echo ".ko count: $(find out -name '*.ko' | wc -l)"

          # Verify display module was built
          if find out -name 'msm_drm.ko' | grep -q .; then
            echo "✓ msm_drm.ko built (display as module)"
          else
            echo "⚠ msm_drm.ko not found — display may not have compiled"
          fi

      # =========================================================================
      # Package boot.img — CLO Image + debug ramdisk + AVB
      # =========================================================================
      - name: Package boot.img
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          CLO_IMAGE=out/arch/arm64/boot/Image
          test -f "$CLO_IMAGE"
          echo "CLO Image: $(stat -c%s "$CLO_IMAGE") bytes"
          mkdir -p out/dist boot-work
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg 2>/dev/null || true
          git clone --depth=1 https://android.googlesource.com/platform/external/avb       tools/avb       2>/dev/null || true
          python3 tools/mkbootimg/unpack_bootimg.py --boot_img boot/debug-boot_a.img --out boot-work
          ls boot-work/
          mkdir -p boot-work/ramdisk-tree
          (cd boot-work/ramdisk-tree && gzip -dc ../ramdisk | cpio -idmu) || true
          echo "=== debug ramdisk adb props ==="
          grep -E '^(ro.debuggable|ro.adb.secure|persist.sys.usb.config)=' boot-work/ramdisk-tree/prop.default || true
          python3 tools/mkbootimg/mkbootimg.py \
            --header_version 3 \
            --os_version 11.0.0 \
            --os_patch_level 2021-01 \
            --kernel "$CLO_IMAGE" \
            --ramdisk boot-work/ramdisk \
            --cmdline ' androidboot.selinux=permissive ignore_loglevel log_buf_len=16M printk.devkmsg=on drm.debug=0x1ff' \
            -o out/dist/boot-new.img
          python3 tools/avb/avbtool.py add_hash_footer \
            --image out/dist/boot-new.img \
            --partition_size 100663296 \
            --partition_name boot
          echo "boot.img: $(stat -c%s out/dist/boot-new.img) bytes"
          rm -rf boot-work/ramdisk-tree

      # =========================================================================
      # Artifacts — manifest, modules, Image, Module.symvers, boot.img
      # =========================================================================
      - name: Dump artifact manifest
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p /tmp/manifest

          echo "=== 1. .config ==="
          cp out/.config /tmp/manifest/dot-config 2>/dev/null || echo "no .config"
          wc -l /tmp/manifest/dot-config 2>/dev/null

          echo "=== 2. .ko list ==="
          find out -name '*.ko' > /tmp/manifest/all-ko-paths.txt
          find out -name '*.ko' | xargs -n1 basename | sort > /tmp/manifest/all-ko-names.txt
          echo ".ko count: $(wc -l < /tmp/manifest/all-ko-paths.txt)"

          echo "=== 3. Module.symvers ==="
          find out -name Module.symvers | head -1 | xargs -I{} cp {} /tmp/manifest/Module.symvers

          echo "=== 4. DTBs ==="
          find out -name '*.dtb' -o -name '*.dtbo' | xargs -n1 basename 2>/dev/null | sort > /tmp/manifest/all-dtb-names.txt

          echo "=== 5. display config ==="
          for key in CONFIG_DISPLAY_BUILD CONFIG_DRM_MSM CONFIG_DRM_MSM_SDE \
                     CONFIG_DRM_MSM_DSI CONFIG_DRM_MSM_DP CONFIG_DRM_SDE_WB \
                     CONFIG_QGKI CONFIG_ARCH_LAHAINA; do
            grep -E "^(# )?${key}(=| is not set)" /tmp/manifest/dot-config 2>/dev/null \
              || echo "${key}=<absent>"
          done > /tmp/manifest/display-config.txt
          cat /tmp/manifest/display-config.txt

          echo "=== 6. builtin vs module ==="
          echo "builtin (=y): $(grep -cE '^CONFIG.*=y$' /tmp/manifest/dot-config 2>/dev/null || echo 0)"
          echo "module (=m):  $(grep -cE '^CONFIG.*=m$' /tmp/manifest/dot-config 2>/dev/null || echo 0)"

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-manifest
          path: /tmp/manifest/
          if-no-files-found: warn

      - name: Upload Module.symvers
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-Module.symvers
          path: /tmp/manifest/Module.symvers
          if-no-files-found: warn

      - name: Collect + upload all .ko modules
        if: always()
        run: |
          mkdir -p /tmp/all-modules
          find out -name '*.ko' -exec cp {} /tmp/all-modules/ \; 2>/dev/null
          echo "total .ko: $(ls /tmp/all-modules/*.ko 2>/dev/null | wc -l)"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: clo-modules
          path: /tmp/all-modules/*.ko
          if-no-files-found: warn

      - name: Upload Image
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-kernel-Image
          path: out/arch/arm64/boot/Image
          if-no-files-found: error
          retention-days: 7

      - name: Upload boot.img
        uses: actions/upload-artifact@v7
        with:
          name: boot-img
          path: out/dist/boot-new.img
          if-no-files-found: error
