name: BuildCLO

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  KERNEL_REPO: arter97-mirror/caf_msm-5.4
  KERNEL_REF: LA.UM.10.9.1.r1
  BUILD_REPO: https://github.com/KudProject/kernel_build.git
  BUILD_REF: android-12.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: false
          swap-storage: true

      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex \
            gcc git libelf-dev libssl-dev lz4 make \
            python3 zip zstd

      - name: Set up workspace (official repo layout)
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 -b "$BUILD_REF" "$BUILD_REPO" build
          git clone --depth=1 -b "$KERNEL_REF" "https://github.com/${KERNEL_REPO}.git" kernel/msm-5.4
          mkdir -p prebuilts-master/clang/host/linux-x86
          mkdir -p prebuilts/gcc/linux-x86/aarch64
          mkdir -p prebuilts/gcc/linux-x86/arm
          mkdir -p prebuilts
          git clone --depth=1 https://git.codelinaro.org/clo/la/platform/prebuilts/build-tools.git prebuilts/build-tools
          ls build/build.sh build/_setup_env.sh
          grep -c 'function append_cmd' build/_setup_env.sh
          ls prebuilts/build-tools/linux-x86/bin/bison prebuilts/build-tools/common/bison 2>/dev/null | head

      - name: Fetch techpack components (CLO @ LA.UM.10.9.1.r1* — per-component closest branch)
        run: |
          cd "$GITHUB_WORKSPACE/kernel/msm-5.4/techpack"
          CLO=https://git.codelinaro.org/clo/la/platform/vendor/opensource
          git clone --depth=1 -b LA.UM.10.9.1.r1   "$CLO/audio-kernel.git"   audio
          git clone --depth=1 -b LA.UM.10.9.1.r1.1 "$CLO/display-drivers.git" display
          git clone --depth=1 -b LA.UM.10.9.1.r1   "$CLO/video-driver.git"   video
          git clone --depth=1 -b LA.UM.10.9.1.r1   "$CLO/dataipa.git"        dataipa
          git clone --depth=1 -b LA.UM.10.9.1.r1.1 "$CLO/camera-kernel.git"  camera
          ls

      - name: Force display DLKM to builtin (all-builtin, skip audio to avoid codec conflicts)
        run: |
          cd "$GITHUB_WORKSPACE/kernel/msm-5.4/techpack"
          echo "=== Only patch display .conf: DISPLAY_BUILD=m to =y ==="
          find . -name '*disp*.conf' -path '*/config/*' -exec sed -i 's/CONFIG_DISPLAY_BUILD=m/CONFIG_DISPLAY_BUILD=y/g' {} \;
          echo "=== Audio .conf left as-is (=m, will compile as module but not packaged) ==="
          echo "=== Other techpack already uses .conf QGKI logic for =y/=m ==="

      - name: Fetch lahaina DTBs (from Motorola SM8350 tree)
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/schqiushui/android_kernel_motorola_sm8350.git /tmp/moto
          cd /tmp/moto
          git sparse-checkout set arch/arm64/boot/dts/vendor
          git checkout
          DTS_ROOT="$GITHUB_WORKSPACE/kernel/msm-5.4/arch/arm64/boot/dts"
          mkdir -p "$DTS_ROOT/vendor/qcom"
          cp -r arch/arm64/boot/dts/vendor/qcom/. "$DTS_ROOT/vendor/qcom/"
          cp arch/arm64/boot/dts/vendor/Makefile "$DTS_ROOT/vendor/Makefile"
          printf '%s\n' \
            'dtb-$(CONFIG_ARCH_LAHAINA) += lahaina-rumi.dtb \' \
            '	lahaina-mtp-hsp.dtb \' \
            '	lahaina-mtp.dtb \' \
            '	lahaina-qrd-hsp.dtb \' \
            '	lahaina-qrd.dtb \' \
            '	lahaina-qrd-module.dtb \' \
            '	lahainap-mtp.dtb \' \
            '	lahainap-qrd.dtb' \
            '' \
            'ifeq ($(CONFIG_BUILD_ARM64_DT_OVERLAY),y)' \
            'dtbo-$(CONFIG_ARCH_LAHAINA) += lahaina-qrd-overlay.dtbo \' \
            '	lahaina-mtp-overlay.dtbo \' \
            '	lahaina-qrd-hsp-overlay.dtbo \' \
            '	lahaina-qrd-module-overlay.dtbo \' \
            '	lahaina-mtp-hsp-overlay.dtbo' \
            '' \
            'lahaina-qrd-overlay.dtbo-base := lahaina.dtb lahaina-v2.dtb lahaina-v2.1.dtb' \
            'lahaina-mtp-overlay.dtbo-base := lahaina.dtb lahaina-v2.dtb lahaina-v2.1.dtb' \
            'lahaina-qrd-hsp-overlay.dtbo-base := lahaina.dtb' \
            'lahaina-qrd-module-overlay.dtbo-base := lahaina.dtb lahaina-v2.dtb lahaina-v2.1.dtb' \
            'lahaina-mtp-hsp-overlay.dtbo-base := lahaina.dtb' \
            'endif' \
            '' \
            'always-y := $(dtb-y) $(dtbo-y)' \
            > "$DTS_ROOT/vendor/qcom/Makefile"
          if ! grep -q 'subdir-y += vendor' "$DTS_ROOT/Makefile"; then
            echo 'subdir-y += vendor' >> "$DTS_ROOT/Makefile"
          fi
          echo "=== qcom Makefile (lahaina-only) ==="
          cat "$DTS_ROOT/vendor/qcom/Makefile"
          echo "=== lahaina dts files present ==="
          ls "$DTS_ROOT/vendor/qcom/" | grep -c '^lahaina'

      - name: Cache AOSP Clang r416183b
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: prebuilts-master/clang/host/linux-x86/clang-r416183b
          key: aosp-clang-r416183b

      - name: Download AOSP Clang r416183b
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p prebuilts-master/clang/host/linux-x86/clang-r416183b
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master-kernel-build-2021/clang-r416183b.tar.gz" \
            | tar xz -C prebuilts-master/clang/host/linux-x86/clang-r416183b
          prebuilts-master/clang/host/linux-x86/clang-r416183b/bin/clang --version

      - name: Cache aarch64 + arm GCC 4.9
        id: cache-gcc
        uses: actions/cache@v5
        with:
          path: |
            prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
            prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
          key: aosp-gcc-4.9-android12L

      - name: Download aarch64 + arm GCC 4.9
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          mkdir -p prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          mkdir -p prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android12L-release.tar.gz" \
            | tar xz -C prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/android12L-release.tar.gz" \
            | tar xz -C prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: sm8350-clo-lahaina-5.4-official
          max-size: 2G

      - name: Build kernel (official build.sh, all-builtin)
        continue-on-error: true
        run: |
          cd "$GITHUB_WORKSPACE"
          # Patch display Makefile to always use QGKI config path
          sed -i 's/ifeq (\$(CONFIG_QGKI), y)/ifeq (y, y)/' kernel/msm-5.4/techpack/display/Makefile
          # Inject CONFIG_DRM_MSM=y into build.sh after POST_DEFCONFIG_CMDS.
          # CONFIG_DRM_MSM is a valid Kconfig tristate (default n). QGKI defconfig
          # does not enable it. We use scripts/config + olddefconfig so auto.conf
          # picks it up before make runs.
          sed -i '/eval \${POST_DEFCONFIG_CMDS}/a\    ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config --enable DRM_MSM' build/build.sh
          sed -i '/scripts\/config.*DRM_MSM/a\    (cd ${OUT_DIR} \&\& make -s "${TOOL_ARGS[@]}" O=${OUT_DIR} "${MAKE_ARGS[@]}" olddefconfig)' build/build.sh
          sed -i '/olddefconfig.*MAKE_ARGS/a\    grep CONFIG_DRM_MSM ${OUT_DIR}/.config | head -3' build/build.sh
          echo "=== Patch applied ==="
          grep -c 'DRM_MSM' build/build.sh
          BUILD_CONFIG=kernel/msm-5.4/build.config.msm.lahaina \
          KERNEL_DIR=kernel/msm-5.4 \
          VARIANT=qgki-debug \
          MAKE_GOALS="Image dtbs" \
          CC="ccache clang" \
          build/build.sh || true
          echo "=== Checking Image exists ==="
          find out -name 'Image' -path '*/arch/arm64/boot/*' -type f | head -1 | xargs ls -la

      - name: Package boot.img (CLO Image + debug ramdisk + AVB pad)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          CLO_IMAGE=$(find out -name 'Image' -path '*/arch/arm64/boot/*' -type f | head -1)
          echo "CLO Image: $CLO_IMAGE ($(stat -c%s "$CLO_IMAGE") bytes)"
          mkdir -p out/dist boot-work
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg 2>/dev/null || true
          git clone --depth=1 https://android.googlesource.com/platform/external/avb       tools/avb       2>/dev/null || true
          python3 tools/mkbootimg/unpack_bootimg.py --boot_img boot/debug-boot_a.img --out boot-work
          ls boot-work/
          mkdir -p boot-work/ramdisk-tree
          # cpio may warn on Magisk .backup/ files (Permission denied) — harmless
          (cd boot-work/ramdisk-tree && gzip -dc ../ramdisk | cpio -idmu) || true
          echo "=== debug ramdisk adb/default props ==="
          grep -E '^(ro.debuggable|ro.adb.secure|persist.sys.usb.config)=' boot-work/ramdisk-tree/prop.default || true
          mkdir -p /tmp/manifest
          {
            echo "boot_base=boot/debug-boot_a.img"
            echo "cmdline=androidboot.selinux=permissive ignore_loglevel log_buf_len=16M printk.devkmsg=on drm.debug=0x1ff"
            grep -E '^(ro.debuggable|ro.adb.secure|persist.sys.usb.config)=' boot-work/ramdisk-tree/prop.default || true
          } > /tmp/manifest/boot-base.txt
          python3 tools/mkbootimg/mkbootimg.py \
            --header_version 3 \
            --os_version 11.0.0 \
            --os_patch_level 2021-01 \
            --kernel "$CLO_IMAGE" \
            --ramdisk boot-work/ramdisk \
            --cmdline ' androidboot.selinux=permissive ignore_loglevel log_buf_len=16M printk.devkmsg=on drm.debug=0x1ff' \
            -o out/dist/boot-new.img
          python3 tools/avb/avbtool.py add_hash_footer \
            --image out/dist/boot-new.img \
            --partition_size 100663296 \
            --partition_name boot
          ls -la out/dist/boot-new.img
          echo "boot.img size: $(stat -c%s out/dist/boot-new.img) bytes"
          # Clean up extracted ramdisk-tree (Magisk dirs have restrictive perms)
          rm -rf boot-work/ramdisk-tree

      - name: Locate outputs
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "=== Image ==="
          find . -path '*/arch/arm64/boot/Image' -not -path '*/build/*' 2>/dev/null | head
          echo "=== Module.symvers ==="
          find . -name Module.symvers -not -path '*/build/*' 2>/dev/null | head
          echo "=== .ko modules ==="
          find . -name '*.ko' -not -path '*/build/*' 2>/dev/null | wc -l

      - name: Dump full artifact manifest
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE"
          OUT=$(find out -maxdepth 1 -type d | grep -v '^out$' | head -1)
          echo "OUT_DIR=$OUT"
          mkdir -p /tmp/manifest

          echo "=== 1. final .config ==="
          find "$OUT" -name '.config' 2>/dev/null | head -1 | xargs -I{} cp {} /tmp/manifest/dot-config 2>/dev/null || echo "no .config found"
          wc -l /tmp/manifest/dot-config 2>/dev/null

          echo "=== 2. all .ko (with full paths) ==="
          find "$OUT" -name '*.ko' 2>/dev/null > /tmp/manifest/all-ko-paths.txt
          find "$OUT" -name '*.ko' 2>/dev/null | xargs -n1 basename 2>/dev/null | sort > /tmp/manifest/all-ko-names.txt
          echo ".ko count: $(wc -l < /tmp/manifest/all-ko-paths.txt)"

          echo "=== 3. Module.symvers ==="
          find "$OUT" -name Module.symvers 2>/dev/null | head -1 | xargs -I{} cp {} /tmp/manifest/Module.symvers 2>/dev/null

          echo "=== 4. all .dtb ==="
          find "$OUT" -name '*.dtb' -o -name '*.dtbo' 2>/dev/null | xargs -n1 basename 2>/dev/null | sort > /tmp/manifest/all-dtb-names.txt 2>/dev/null
          echo "dtb count: $(wc -l < /tmp/manifest/all-dtb-names.txt 2>/dev/null || echo 0)"

          echo "=== 5. .config: CNSS/WLAN/PCI key values ==="
          grep -iE '^CONFIG_(CNSS|ICNSS|PCI_MSM|ARCH_QCOM|ARCH_LAHAINA|WLAN|CNSS_UTILS)=' /tmp/manifest/dot-config 2>/dev/null > /tmp/manifest/wifi-config.txt || echo "no .config to grep"

          echo "=== 5b. .config: USB/touch/haptics/display key values ==="
          cat > /tmp/manifest/device-config-keys.txt <<'EOF'
          CONFIG_USB_DWC3
          CONFIG_USB_DWC3_QCOM
          CONFIG_USB_DWC3_MSM
          CONFIG_USB_DWC3_DUAL_ROLE
          CONFIG_USB_GADGET
          CONFIG_USB_LIBCOMPOSITE
          CONFIG_USB_F_FS
          CONFIG_USB_CONFIGFS
          CONFIG_USB_CONFIGFS_UEVENT
          CONFIG_USB_CONFIGFS_F_FS
          CONFIG_USB_CONFIGFS_F_DIAG
          CONFIG_USB_CONFIGFS_F_GSI
          CONFIG_USB_CONFIGFS_F_QDSS
          CONFIG_USB_ROLE_SWITCH
          CONFIG_USB_MSM_SSPHY_QMP
          CONFIG_MSM_HSUSB_PHY
          CONFIG_NOP_USB_XCEIV
          CONFIG_TYPEC
          CONFIG_TYPEC_UCSI
          CONFIG_UCSI_QTI_GLINK
          CONFIG_QTI_PMIC_GLINK
          CONFIG_QTI_ALTMODE_GLINK
          CONFIG_QCOM_EUD
          CONFIG_EXTCON
          CONFIG_EXTCON_USB_GPIO
          CONFIG_INPUT_QPNP_POWER_ON
          CONFIG_INPUT_QCOM_HV_HAPTICS
          CONFIG_TOUCHSCREEN_GOODIX
          CONFIG_TOUCHSCREEN_GOODIX_I2C
          CONFIG_TOUCHSCREEN_GOODIX_BRL
          CONFIG_TOUCHSCREEN_GOODIX_BRL_I2C
          CONFIG_TOUCHSCREEN_SYNAPTICS_DSX
          CONFIG_TOUCHSCREEN_FTS
          CONFIG_TOUCHSCREEN_NT36XXX
          CONFIG_AW86917_HAPTICS
          CONFIG_DISPLAY_BUILD
          CONFIG_DRM_MSM
          CONFIG_MSM_DRM
          EOF
          sed -i 's/^          //' /tmp/manifest/device-config-keys.txt
          while IFS= read -r key; do
            grep -E "^(# )?${key}(=| is not set)" /tmp/manifest/dot-config 2>/dev/null || echo "${key}=<absent>"
          done < /tmp/manifest/device-config-keys.txt > /tmp/manifest/device-config.txt

          echo "=== 6. .config: builtin(=y) count vs module(=m) count ==="
          echo "builtin (=y): $(grep -cE '^CONFIG.*=y$' /tmp/manifest/dot-config 2>/dev/null || echo 0)"
          echo "module (=m):  $(grep -cE '^CONFIG.*=m$' /tmp/manifest/dot-config 2>/dev/null || echo 0)"

          echo "=== 7. modules.load + modules.dep (if exist) ==="
          find "$OUT" -name 'modules.load' 2>/dev/null | head -1 | xargs -I{} cp {} /tmp/manifest/modules.load 2>/dev/null
          find "$OUT" -name 'modules.dep' 2>/dev/null | head -1 | xargs -I{} cp {} /tmp/manifest/modules.dep 2>/dev/null

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-manifest
          path: /tmp/manifest/
          if-no-files-found: warn

      - name: Collect + upload all .ko modules
        if: always()
        run: |
          mkdir -p /tmp/all-modules
          OUT=$(find out -maxdepth 1 -type d | grep -v '^out$' | head -1)
          find "$OUT" -name '*.ko' -exec cp {} /tmp/all-modules/ \; 2>/dev/null
          echo "total .ko: $(ls /tmp/all-modules/*.ko 2>/dev/null | wc -l)"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: clo-modules
          path: /tmp/all-modules/*.ko
          if-no-files-found: warn

      - name: Upload Image
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-kernel-Image
          path: |
            out/**/arch/arm64/boot/Image
            **/arch/arm64/boot/Image
          if-no-files-found: warn
          retention-days: 7

      - name: Upload boot.img (flashable, all-builtin)
        uses: actions/upload-artifact@v7
        with:
          name: boot-img
          path: out/dist/boot-new.img
          if-no-files-found: error
