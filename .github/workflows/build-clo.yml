name: BuildCLO

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  KERNEL_REPO: arter97-mirror/caf_msm-5.4
  KERNEL_REF: kernel.lnx.5.4.1.r1-rel
  CLANG_REV: r383902
  CLANG_BRANCH: master-kernel-build-2021

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      KBUILD_BUILD_TIMESTAMP: '@1616113200'

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: false
          swap-storage: true

      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Checkout CLO kernel (arter97 mirror)
        uses: actions/checkout@v7
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_REF }}
          path: kernel

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex \
            gcc git libelf-dev libssl-dev lz4 make \
            python3 zip zstd

      - name: Cache AOSP Clang ${{ env.CLANG_REV }}
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/toolchains/clang
          key: aosp-clang-${{ env.CLANG_REV }}

      - name: Download AOSP Clang ${{ env.CLANG_REV }}
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/clang
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${CLANG_BRANCH}/clang-${CLANG_REV}.tar.gz" \
            | tar xz -C toolchains/clang
          toolchains/clang/bin/clang --version

      - name: Cache aarch64 GCC cross-toolchain
        id: cache-gcc
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/toolchains/gcc-aarch64
          key: aosp-gcc-aarch64-4.9-android12L

      - name: Download aarch64 GCC cross-toolchain
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/gcc-aarch64
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android12L-release.tar.gz" \
            | tar xz -C toolchains/gcc-aarch64

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: sm8350-clo-lahaina-5.4
          max-size: 2G

      - name: Probe tree (what defconfigs / techpack / build.config are present?)
        working-directory: kernel
        run: |
          echo "=== Makefile version ==="
          head -5 Makefile
          echo ""
          echo "=== vendor defconfigs (lahaina) ==="
          ls arch/arm64/configs/vendor/ | grep -i lahaina || echo "(no vendor/lahaina defconfigs)"
          echo ""
          echo "=== build.config.msm.lahaina present? ==="
          ls build.config.msm.* 2>/dev/null || echo "(no build.config.msm.*)"
          echo ""
          echo "=== techpack/ contents ==="
          ls techpack/ 2>/dev/null
          echo ""
          echo "=== DTBs: dts/vendor/qcom lahaina count ==="
          ls arch/arm64/boot/dts/vendor/qcom/lahaina-qrd* 2>/dev/null | head || echo "(no lahaina-qrd DTB in dts/vendor/qcom)"
          ls arch/arm64/boot/dts/qcom/lahaina-qrd* 2>/dev/null | head || echo "(no lahaina-qrd DTB in dts/qcom)"

      - name: Configure kernel
        working-directory: kernel
        run: |
          CLANG="${{ github.workspace }}/toolchains/clang/bin"
          GCC="${{ github.workspace }}/toolchains/gcc-aarch64/bin"
          export PATH="$CLANG:$GCC:$PATH"

          MAKE_FLAGS=(
            O=out
            ARCH=arm64
            CC="ccache clang"
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            LLVM=1
            LLVM_IAS=1
            KCFLAGS="-Wno-error=return-type -Wno-error=unused-function"
          )

          mkdir -p out
          # CLO defconfig assembly: generate_defconfig.sh merges fragments and writes
          # arch/arm64/configs/vendor/lahaina-qgki-debug_defconfig (then DELETES .config).
          # So step 1: run it to create the defconfig file. step 2: make <that> to populate out/.config.
          export REAL_CC="ccache clang"
          export LD=ld.lld
          export HOSTCC=clang
          export HOSTLD=ld.lld
          export HOSTAR=llvm-ar
          export TARGET_BUILD_VARIANT=userdebug
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # Step 1: create the vendor/lahaina-qgki-debug_defconfig file from fragments
          ./scripts/gki/generate_defconfig.sh vendor/lahaina-qgki-debug_defconfig
          ls -la arch/arm64/configs/vendor/lahaina-qgki-debug_defconfig

          # Step 2: populate out/.config from the generated defconfig
          make "${MAKE_FLAGS[@]}" vendor/lahaina-qgki-debug_defconfig

          echo "=== resulting .config: key flags ==="
          grep -E '^CONFIG_(LOCALVERSION|ARCH_LAHAINA|SCHED_WALT|NO_HZ_COMMON|LTO|CFI|MODVERSIONS|MODULES)=' out/.config | head

      - name: Build kernel + modules
        working-directory: kernel
        run: |
          CLANG="${{ github.workspace }}/toolchains/clang/bin"
          GCC="${{ github.workspace }}/toolchains/gcc-aarch64/bin"
          export PATH="$CLANG:$GCC:$PATH"

          # Build Image
          make O=out ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-error=return-type -Wno-error=unused-function" \
            -j"$(nproc)"

      - name: Install modules (.ko set)
        working-directory: kernel
        run: |
          CLANG="${{ github.workspace }}/toolchains/clang/bin"
          GCC="${{ github.workspace }}/toolchains/gcc-aarch64/bin"
          export PATH="$CLANG:$GCC:$PATH"
          mkdir -p out/modules
          make O=out ARCH=arm64 \
            CC="ccache clang" LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-android- \
            KCFLAGS="-Wno-error=return-type -Wno-error=unused-function" \
            INSTALL_MOD_PATH="$PWD/out/modules" \
            INSTALL_MOD_STRIP=1 \
            modules_install || echo "modules_install had issues (expected without techpack)"
          echo "=== built .ko modules ==="
          find out/modules -name '*.ko' | wc -l | sed 's/^/  .ko count: /'
          find out/modules -name '*.ko' | head -20

      - name: Upload Image
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-kernel-Image
          path: kernel/out/arch/arm64/boot/Image
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Module.symvers
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-Module.symvers
          path: kernel/out/Module.symvers
          if-no-files-found: warn
          retention-days: 30

      - name: Upload modules
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clo-modules
          path: kernel/out/modules/
          if-no-files-found: warn
          retention-days: 7
