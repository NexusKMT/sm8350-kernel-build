name: TEST

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  BOOT_RELEASE_TAG: stock-boot-template
  BOOT_ASSET: alpha_boot_a.img

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    env:
      BOOT_HEADER_VERSION: "3"
      BOOT_OS_VERSION: "11.0.0"
      BOOT_OS_PATCH_LEVEL: "2020-10"
      BOOT_PARTITION_SIZE: "100663296"

    steps:
      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends python3

      - name: Fetch official AOSP tools
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg
          git clone --depth=1 https://android.googlesource.com/platform/external/avb       tools/avb
          echo "MKBOOTIMG=$PWD/tools/mkbootimg/mkbootimg.py" >> "$GITHUB_ENV"
          echo "UNPACK=$PWD/tools/mkbootimg/unpack_bootimg.py" >> "$GITHUB_ENV"
          echo "AVBTOOL=$PWD/tools/avb/avbtool.py"           >> "$GITHUB_ENV"

      - name: Download stock boot.img template
        run: |
          mkdir -p out
          gh release download "$BOOT_RELEASE_TAG" \
            -R "$GITHUB_REPOSITORY" -p "$BOOT_ASSET" -D out
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack stock boot.img (official unpack_bootimg)
        run: |
          mkdir -p stock
          python3 "$UNPACK" --boot_img "out/$BOOT_ASSET" --out stock

      - name: Repack stock boot.img (official mkbootimg)
        run: |
          python3 "$MKBOOTIMG" \
            --header_version "$BOOT_HEADER_VERSION" \
            --os_version "$BOOT_OS_VERSION" \
            --os_patch_level "$BOOT_OS_PATCH_LEVEL" \
            --kernel stock/kernel \
            --ramdisk stock/ramdisk \
            --cmdline '' \
            -o out/stock-test.img

      - name: Pad to partition size (official avbtool)
        run: |
          python3 "$AVBTOOL" add_hash_footer \
            --image out/stock-test.img \
            --partition_size "$BOOT_PARTITION_SIZE" \
            --partition_name boot

      - name: Upload stock-test.img
        uses: actions/upload-artifact@v7
        with:
          name: stock-test
          path: out/stock-test.img
          if-no-files-found: error
