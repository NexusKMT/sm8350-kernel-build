name: Build kernel

# Lean harness: checks out upstream LineageOS OnePlus SM8350 (lahaina / msm-5.4)
# kernel at lineage-18.1 and builds the vendor/lahaina-qgki_defconfig, using the
# toolchain the source itself declares (clang-r383902) with ccache.
on:
  workflow_dispatch:
    inputs:
      upload_boot_img:
        description: "Publish a flashable boot.img to Releases (needs a stock template; off by default)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  KERNEL_REPO: LineageOS/android_kernel_oneplus_sm8350
  KERNEL_REF: lineage-18.1
  CLANG_REV: r383902
  CLANG_BRANCH: master-kernel-build-2021

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      # ccache-determinism: pin the build timestamp so the version string baked
      # into compile.h is stable across runs. Without this ccache hit rate is
      # ~1% (every object churns). Measured: raises hot-run hits to ~79%.
      KBUILD_BUILD_TIMESTAMP: '@1616113200'

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: false   # keep: actions/cache (toolchains + ccache) needs it
          swap-storage: true

      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Checkout upstream kernel
        uses: actions/checkout@v7
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_REF }}
          path: kernel

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex \
            gcc git libelf-dev libssl-dev lz4 make \
            python3 zip zstd

      - name: Cache AOSP Clang ${{ env.CLANG_REV }}
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/toolchains/clang
          key: aosp-clang-${{ env.CLANG_REV }}

      - name: Download AOSP Clang ${{ env.CLANG_REV }}
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/clang
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${CLANG_BRANCH}/clang-${CLANG_REV}.tar.gz" \
            | tar xz -C toolchains/clang
          toolchains/clang/bin/clang --version

      - name: Cache aarch64 GCC cross-toolchain
        id: cache-gcc
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/toolchains/gcc-aarch64
          key: aosp-gcc-aarch64-4.9-android12L

      - name: Download aarch64 GCC cross-toolchain
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/gcc-aarch64
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android12L-release.tar.gz" \
            | tar xz -C toolchains/gcc-aarch64

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: sm8350-lahaina-qgki-5.4
          max-size: 2G

      - name: Configure kernel
        working-directory: kernel
        run: |
          CLANG="${{ github.workspace }}/toolchains/clang/bin"
          GCC="${{ github.workspace }}/toolchains/gcc-aarch64/bin"
          export PATH="$CLANG:$GCC:$PATH"

          MAKE_FLAGS=(
            O=out
            ARCH=arm64
            CC="ccache clang"
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            LLVM=1
            LLVM_IAS=1
          )

          make "${MAKE_FLAGS[@]}" vendor/lahaina-qgki_defconfig

          # 5.4 predates CONFIG_MODULE_REL_CRCS; under LLD 11 modpost emits
          # __crc_* as R_AARCH64_ABS32 which LLD rejects at vmlinux link. All
          # drivers build builtin, so disable MODVERSIONS (no external .ko).
          ./scripts/config --file out/.config --disable MODVERSIONS
          ./scripts/config --file out/.config --disable LOCALVERSION_AUTO
          make "${MAKE_FLAGS[@]}" olddefconfig

      - name: Build kernel
        working-directory: kernel
        run: |
          CLANG="${{ github.workspace }}/toolchains/clang/bin"
          GCC="${{ github.workspace }}/toolchains/gcc-aarch64/bin"
          export PATH="$CLANG:$GCC:$PATH"

          make O=out ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LLVM=1 LLVM_IAS=1 \
            -j"$(nproc)"

      - name: Verify build
        working-directory: kernel
        run: |
          ls -lh out/arch/arm64/boot/Image 2>/dev/null \
            && echo "Image built ✓" \
            || { echo "Image MISSING ✗"; exit 1; }
          echo "--- ccache stats ---"
          ccache -s 2>/dev/null | grep -iE 'cache hit|cache miss|hit rate' || true

      - name: Upload Image (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kernel-Image
          path: kernel/out/arch/arm64/boot/Image
          if-no-files-found: warn
          retention-days: 7
