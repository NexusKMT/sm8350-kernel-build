name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  KERNEL_REPO: LineageOS/android_kernel_oneplus_sm8350
  KERNEL_REF: lineage-18.1
  CLANG_REV: r383902
  CLANG_BRANCH: master-kernel-build-2021

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      KBUILD_BUILD_TIMESTAMP: '@1616113200'

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: false
          swap-storage: true

      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Checkout upstream kernel
        uses: actions/checkout@v7
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_REF }}
          path: kernel

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex \
            gcc git libelf-dev libssl-dev lz4 make \
            python3 zip zstd

      - name: Cache AOSP Clang ${{ env.CLANG_REV }}
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/toolchains/clang
          key: aosp-clang-${{ env.CLANG_REV }}

      - name: Download AOSP Clang ${{ env.CLANG_REV }}
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/clang
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${CLANG_BRANCH}/clang-${CLANG_REV}.tar.gz" \
            | tar xz -C toolchains/clang
          toolchains/clang/bin/clang --version

      - name: Cache aarch64 GCC cross-toolchain
        id: cache-gcc
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/toolchains/gcc-aarch64
          key: aosp-gcc-aarch64-4.9-android12L

      - name: Download aarch64 GCC cross-toolchain
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/gcc-aarch64
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android12L-release.tar.gz" \
            | tar xz -C toolchains/gcc-aarch64

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: sm8350-lahaina-qgki-5.4
          max-size: 2G

      - name: Configure kernel
        working-directory: kernel
        run: |
          CLANG="${{ github.workspace }}/toolchains/clang/bin"
          GCC="${{ github.workspace }}/toolchains/gcc-aarch64/bin"
          export PATH="$CLANG:$GCC:$PATH"

          MAKE_FLAGS=(
            O=out
            ARCH=arm64
            CC="ccache clang"
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            LLVM=1
            LLVM_IAS=1
          )

          make "${MAKE_FLAGS[@]}" vendor/lahaina-qgki_defconfig
          ./scripts/config --file out/.config --disable MODVERSIONS
          ./scripts/config --file out/.config --disable LOCALVERSION_AUTO
          make "${MAKE_FLAGS[@]}" olddefconfig

      - name: Build kernel
        working-directory: kernel
        run: |
          CLANG="${{ github.workspace }}/toolchains/clang/bin"
          GCC="${{ github.workspace }}/toolchains/gcc-aarch64/bin"
          export PATH="$CLANG:$GCC:$PATH"

          make O=out ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LLVM=1 LLVM_IAS=1 \
            -j"$(nproc)"

      - name: Upload Image (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kernel-Image
          path: kernel/out/arch/arm64/boot/Image
          if-no-files-found: warn
          retention-days: 7

  repack:
    needs: build
    if: ${{ success() }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    env:
      BOOT_HEADER_VERSION: "3"
      BOOT_OS_VERSION: "11.0.0"
      BOOT_OS_PATCH_LEVEL: "2020-10"
      BOOT_PARTITION_SIZE: "100663296"

    steps:
      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends python3

      - name: Fetch official AOSP tools
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg
          git clone --depth=1 https://android.googlesource.com/platform/external/avb       tools/avb
          echo "MKBOOTIMG=$PWD/tools/mkbootimg/mkbootimg.py" >> "$GITHUB_ENV"
          echo "AVBTOOL=$PWD/tools/avb/avbtool.py"           >> "$GITHUB_ENV"

      - name: Download built Image
        uses: actions/download-artifact@v7
        with:
          name: kernel-Image
          path: built

      - name: Package boot.img (official mkbootimg)
        run: |
          mkdir -p out
          python3 "$MKBOOTIMG" \
            --header_version "$BOOT_HEADER_VERSION" \
            --os_version "$BOOT_OS_VERSION" \
            --os_patch_level "$BOOT_OS_PATCH_LEVEL" \
            --kernel built/Image \
            --ramdisk stock/ramdisk.cpio.gz \
            --cmdline '' \
            -o out/boot-new.img
          ls -lh out/boot-new.img

      - name: Pad boot.img to partition size (official avbtool)
        run: |
          python3 "$AVBTOOL" add_hash_footer \
            --image out/boot-new.img \
            --partition_size "$BOOT_PARTITION_SIZE" \
            --partition_name boot \

      - name: Upload flashable boot.img
        uses: actions/upload-artifact@v7
        with:
          name: boot-img
          path: out/boot-new.img
          if-no-files-found: error
