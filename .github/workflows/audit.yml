name: Audit

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "BuildCLO run ID (for CLO Image + Module.symvers + manifest)"
        required: true
        default: "27916917873"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends kmod e2fsprogs

      - name: Download CLO Image + modules + manifest + Module.symvers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p clo
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-kernel-Image    -D clo/image
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-modules         -D clo/modules
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-Module.symvers -D clo/symvers
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-manifest       -D clo/manifest

      - name: Download stock firmware + debug boot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p stock
          gh release download firmware-vendor -R "$GITHUB_REPOSITORY" -D stock -p "vendor_a.img.gz"
          gunzip -f stock/vendor_a.img.gz

      - name: Extract stock IKCONFIG from debug boot
        run: |
          curl -sL "https://android.googlesource.com/kernel/msm/+/refs/tags/android-11.0.0_r0.31/scripts/extract-ikconfig?format=TEXT" \
            | base64 -d > /tmp/extract-ikconfig
          chmod +x /tmp/extract-ikconfig
          /tmp/extract-ikconfig boot/debug-boot_a.img > stock/stock-ikconfig.txt
          echo "stock config lines: $(wc -l < stock/stock-ikconfig.txt)"

      - name: Find CLO Image
        run: |
          CLO_IMAGE=$(find clo/image -name 'Image' -type f | head -1)
          echo "CLO_IMAGE=$CLO_IMAGE" >> "$GITHUB_ENV"
          ls -la "$CLO_IMAGE"

      - name: Extract CLO .config
        run: |
          cp clo/manifest/dot-config clo/clo-config.txt
          echo "CLO config lines: $(wc -l < clo/clo-config.txt)"

      - name: Inventory CLO built modules
        run: |
          find clo/modules -name '*.ko' -printf '%f\n' | sort -u > clo/clo-ko-names.txt
          find clo/modules -name '*.ko' -printf '%P\n' | sort > clo/clo-ko-relpaths.txt
          echo "CLO built .ko: $(wc -l < clo/clo-ko-names.txt)"
          head -30 clo/clo-ko-names.txt

      - name: Mount stock vendor ro + list modules
        run: |
          sudo mkdir -p /mnt/vendor
          sudo mount -o loop,ro stock/vendor_a.img /mnt/vendor
          sudo find /mnt/vendor -name '*.ko' -printf '%f\n' | sort -u > stock/vendor-ko-names.txt
          sudo find /mnt/vendor -name '*.ko' -printf '%P\n' | sort > stock/vendor-ko-relpaths.txt
          KVER=$(ls /mnt/vendor/lib/modules/ | head -1)
          echo "KVER=$KVER" >> "$GITHUB_ENV"
          cat /mnt/vendor/lib/modules/${KVER}/modules.load 2>/dev/null | xargs -n1 basename 2>/dev/null | sort -u > stock/modules-load-names.txt || true
          echo "vendor .ko: $(wc -l < stock/vendor-ko-names.txt)"
          echo "modules.load entries: $(wc -l < stock/modules-load-names.txt)"
          sudo umount /mnt/vendor

      - name: Extract stock kernel builtin module names
        run: |
          mkdir -p stock/kernel-unpacked
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg /tmp/mkbootimg
          python3 /tmp/mkbootimg/unpack_bootimg.py --boot_img boot/debug-boot_a.img --out stock/kernel-unpacked >/dev/null 2>&1
          strings -a stock/kernel-unpacked/kernel > stock/stock-kernel-strings.txt
          echo "stock kernel strings: $(wc -l < stock/stock-kernel-strings.txt)"

      - name: CLO Image builtin strings
        run: |
          strings -a "$CLO_IMAGE" > clo/clo-kernel-strings.txt
          echo "CLO kernel strings: $(wc -l < clo/clo-kernel-strings.txt)"

      - name: Audit stock vendor .ko coverage
        run: |
          mkdir -p out
          echo "# Vendor module source coverage audit" > out/audit-report.md
          echo "" >> out/audit-report.md
          echo "For each stock vendor .ko, classify whether it is:" >> out/audit-report.md
          echo "" >> out/audit-report.md
          echo "- builtin in the CLO Image" >> out/audit-report.md
          echo "- available as a CLO-built replacement module" >> out/audit-report.md
          echo "- stock-only and therefore still a source/ABI/CRC risk" >> out/audit-report.md
          echo "" >> out/audit-report.md
          echo "The most important list is modules.load entries that are neither builtin nor built by CLO." >> out/audit-report.md
          echo "" >> out/audit-report.md
          echo "## Summary" >> out/audit-report.md
          BUILTIN=0
          BUILT_REPLACEMENT=0
          STOCK_ONLY=0
          LOADLIST_TOTAL=0
          LOADLIST_BUILTIN=0
          LOADLIST_BUILT_REPLACEMENT=0
          LOADLIST_STOCK_ONLY=0
          > out/module-only.txt
          > out/builtin-covered.txt
          > out/clo-built-replacements.txt
          > out/loadlist-builtin-covered.txt
          > out/loadlist-clo-built-replacements.txt
          > out/loadlist-missing-source.txt
          > out/stock-only.txt
          > out/source-sync-candidates.txt
          while IFS= read -r ko_name; do
            ko_base="${ko_name%.ko}"
            IS_BUILTIN=0
            if grep -q "^${ko_base}\.\|^${ko_base}\b" clo/clo-kernel-strings.txt 2>/dev/null; then
              IS_BUILTIN=1
            fi
            IS_BUILT=0
            if grep -qx "$ko_name" clo/clo-ko-names.txt 2>/dev/null; then
              IS_BUILT=1
            fi
            IS_IN_LOADLIST=0
            if [ -f stock/modules-load-names.txt ] && grep -qx "$ko_name" stock/modules-load-names.txt 2>/dev/null; then
              IS_IN_LOADLIST=1
              LOADLIST_TOTAL=$((LOADLIST_TOTAL + 1))
            fi

            if [ "$IS_BUILTIN" = "1" ]; then
              BUILTIN=$((BUILTIN + 1))
              echo "$ko_name" >> out/builtin-covered.txt
              if [ "$IS_IN_LOADLIST" = "1" ]; then
                LOADLIST_BUILTIN=$((LOADLIST_BUILTIN + 1))
                echo "$ko_name" >> out/loadlist-builtin-covered.txt
              fi
            elif [ "$IS_BUILT" = "1" ]; then
              BUILT_REPLACEMENT=$((BUILT_REPLACEMENT + 1))
              echo "$ko_name" >> out/clo-built-replacements.txt
              echo "$ko_name" >> out/module-only.txt
              if [ "$IS_IN_LOADLIST" = "1" ]; then
                LOADLIST_BUILT_REPLACEMENT=$((LOADLIST_BUILT_REPLACEMENT + 1))
                echo "$ko_name" >> out/loadlist-clo-built-replacements.txt
              fi
            else
              STOCK_ONLY=$((STOCK_ONLY + 1))
              echo "$ko_name" >> out/stock-only.txt
              echo "$ko_name" >> out/module-only.txt
              if [ "$IS_IN_LOADLIST" = "1" ]; then
                LOADLIST_STOCK_ONLY=$((LOADLIST_STOCK_ONLY + 1))
                echo "$ko_name" >> out/loadlist-missing-source.txt
                STOCK_REL=$(grep "/${ko_name}$" stock/vendor-ko-relpaths.txt | head -1 || true)
                if [ -n "$STOCK_REL" ]; then
                  echo "${ko_name}	${STOCK_REL}" >> out/source-sync-candidates.txt
                else
                  echo "${ko_name}" >> out/source-sync-candidates.txt
                fi
              fi
            fi
          done < stock/vendor-ko-names.txt

          echo "- stock vendor .ko total: $(wc -l < stock/vendor-ko-names.txt)" >> out/audit-report.md
          echo "- stock modules.load entries: $LOADLIST_TOTAL" >> out/audit-report.md
          echo "- CLO-built .ko total: $(wc -l < clo/clo-ko-names.txt)" >> out/audit-report.md
          echo "- builtin in CLO Image: $BUILTIN" >> out/audit-report.md
          echo "- available as CLO-built replacement .ko: $BUILT_REPLACEMENT" >> out/audit-report.md
          echo "- stock-only .ko not built by CLO: $STOCK_ONLY" >> out/audit-report.md
          echo "- modules.load covered by builtin: $LOADLIST_BUILTIN" >> out/audit-report.md
          echo "- modules.load covered by CLO-built .ko: $LOADLIST_BUILT_REPLACEMENT" >> out/audit-report.md
          echo "- modules.load still stock-only / missing source: $LOADLIST_STOCK_ONLY" >> out/audit-report.md
          echo "" >> out/audit-report.md

          echo "## Source sync candidates (modules.load + not builtin + not built by CLO)" >> out/audit-report.md
          echo '```' >> out/audit-report.md
          cat out/source-sync-candidates.txt >> out/audit-report.md
          echo '```' >> out/audit-report.md
          echo "" >> out/audit-report.md

          echo "## modules.load covered by CLO-built .ko" >> out/audit-report.md
          echo '```' >> out/audit-report.md
          cat out/loadlist-clo-built-replacements.txt >> out/audit-report.md
          echo '```' >> out/audit-report.md
          echo "" >> out/audit-report.md

          echo "## modules.load covered by builtin Image content" >> out/audit-report.md
          echo '```' >> out/audit-report.md
          cat out/loadlist-builtin-covered.txt >> out/audit-report.md
          echo '```' >> out/audit-report.md
          echo "" >> out/audit-report.md

          echo "## All stock-only modules (not builtin, not built by CLO)" >> out/audit-report.md
          echo '```' >> out/audit-report.md
          cat out/stock-only.txt >> out/audit-report.md
          echo '```' >> out/audit-report.md
          echo "" >> out/audit-report.md
          cat out/audit-report.md

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        with:
          name: module-audit
          path: out/
          if-no-files-found: error
