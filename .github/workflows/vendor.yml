name: Vendor

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "BuildCLO run ID to pull kernel Image + modules from"
        required: true
        default: "27914596209"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout harness
        uses: actions/checkout@v7

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 cpio gzip e2fsprogs simg2img img2simg \
            device-tree-compiler

      - name: Fetch official mkbootimg + avbtool
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg
          git clone --depth=1 https://android.googlesource.com/platform/external/avb       tools/avb

      - name: Download CLO kernel Image + modules from BuildCLO run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p clo
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-kernel-Image    -D clo/image
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-Module.symvers -D clo/symvers
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-manifest       -D clo/manifest
          ls -la clo/image/ clo/manifest/

      - name: Download stock firmware from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p stock
          gh release download firmware-vendor -R "$GITHUB_REPOSITORY" -D stock \
            -p "vendor_a.img.gz" -p "vendor_boot_a.img.gz" -p "odm_a.img" -p "dtbo_a.img.gz"
          for f in stock/*.gz; do gunzip -f "$f"; done
          ls -la stock/

      - name: Collect CLO built .ko modules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p clo/modules
          gh run download "${{ inputs.build_run_id }}" -R "$GITHUB_REPOSITORY" -n clo-modules -D clo/modules
          CLO_KO_COUNT=$(find clo/modules -name '*.ko' | wc -l)
          echo "CLO .ko collected: $CLO_KO_COUNT"
          find clo/modules -name '*.ko' | xargs -n1 basename | sort > clo/clo-ko-names.txt
          cat clo/clo-ko-names.txt | head -20

      - name: Mount ro + copy vendor.img to workdir
        run: |
          file stock/vendor_a.img
          sudo mkdir -p /mnt/vendor
          sudo mount -o loop,ro stock/vendor_a.img /mnt/vendor
          mkdir -p vendor-work
          sudo cp -a /mnt/vendor/. vendor-work/
          sudo umount /mnt/vendor
          sudo chown -R runner:runner vendor-work
          find vendor-work -name '*.ko' -printf '%p\n' | sort > stock/stock-ko-paths.txt
          STOCK_KO_COUNT=$(wc -l < stock/stock-ko-paths.txt)
          echo "stock vendor .ko count: $STOCK_KO_COUNT"
          find vendor-work -name '*.ko' | xargs -n1 basename | sort -u > stock/stock-ko-names.txt
          head -20 stock/stock-ko-names.txt

      - name: Replace kernel modules in vendor workdir (inject .ko)
        run: |
          echo "=== Module replacement map ==="
          echo "CLO modules: $(wc -l < clo/clo-ko-names.txt)"
          echo "stock modules: $(wc -l < stock/stock-ko-names.txt)"
          REPLACED=0
          KEPT=0
          while IFS= read -r ko_name; do
            STOCK_PATH=$(grep "/${ko_name}$" stock/stock-ko-paths.txt | head -1)
            CLO_PATH="clo/modules/${ko_name}"
            if [ -n "$STOCK_PATH" ] && [ -f "$CLO_PATH" ]; then
              cp "$CLO_PATH" "$STOCK_PATH"
              chmod 644 "$STOCK_PATH"
              REPLACED=$((REPLACED + 1))
              echo "  REPLACE: $ko_name"
            elif [ -n "$STOCK_PATH" ]; then
              KEPT=$((KEPT + 1))
            fi
          done < stock/stock-ko-names.txt
          echo ""
          echo "=== Summary ==="
          echo "Replaced (CLO .ko → stock vendor): $REPLACED"
          echo "Kept stock (no CLO equivalent):     $KEPT"
          echo "CLO-only (not in stock, skipped):  $(comm -23 clo/clo-ko-names.txt stock/stock-ko-names.txt | wc -l)"

      - name: Regenerate depmod + repack vendor.img
        run: |
          KVER=$(ls vendor-work/lib/modules/ | head -1)
          echo "kernel version dir: $KVER"
          depmod -b vendor-work "$KVER" 2>&1 || echo "depmod warning (expected for cross-arch)"
          head -5 "vendor-work/lib/modules/${KVER}/modules.dep"
          VENDOR_SIZE=$(stat -c%s stock/vendor_a.img)
          echo "original vendor.img size: $VENDOR_SIZE"
          mke2fs -t ext4 -b 4096 -d vendor-work -L vendor out/vendor-new.img $((VENDOR_SIZE / 4096)) 2>&1 || {
            echo "mke2fs failed, trying mkuserimg_mke2fs"
            mkuserimg_mke2fs vendor-work out/vendor-new.img ext4 vendor "$VENDOR_SIZE" 2>&1
          }
          ls -la out/vendor-new.img

      - name: Build boot.img (CLO Image + alpha ramdisk + avb pad)
        run: |
          CLO_IMAGE=$(find clo/image -name 'Image' -type f | head -1)
          echo "CLO Image: $CLO_IMAGE ($(stat -c%s "$CLO_IMAGE") bytes)"
          mkdir -p boot-work
          python3 tools/mkbootimg/unpack_bootimg.py --boot_img boot/alpha-boot_a.img --out boot-work/stock >/dev/null 2>&1
          ls boot-work/stock/
          python3 tools/mkbootimg/mkbootimg.py \
            --header_version 3 \
            --os_version 11.0.0 \
            --os_patch_level 2021-01 \
            --kernel "$CLO_IMAGE" \
            --ramdisk boot-work/stock/ramdisk \
            --cmdline ' androidboot.selinux=permissive' \
            -o out/boot-new.img
          python3 tools/avb/avbtool.py add_hash_footer \
            --image out/boot-new.img \
            --partition_size 100663296 \
            --partition_name boot
          ls -la out/boot-new.img

      - name: Upload vendor-new.img
        uses: actions/upload-artifact@v7
        with:
          name: vendor-img
          path: out/vendor-new.img
          if-no-files-found: error

      - name: Upload boot-new.img
        uses: actions/upload-artifact@v7
        with:
          name: boot-img
          path: out/boot-new.img
          if-no-files-found: error

      - name: Upload replacement report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vendor-report
          path: |
            clo/clo-ko-names.txt
            stock/stock-ko-names.txt
